<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Break the habbit — Settings</title>
    <link rel="stylesheet" href="options.css" />
  </head>
  <body>
    <main class="container">
      <h1>Break the habbit</h1>
      <p class="hint">
        Enter one domain per line (e.g. <code>example.com</code>). Subdomains are
        blocked automatically.
      </p>

      <label class="label" for="overlay-opacity">Overlay opacity</label>
      <div class="slider-row">
        <input
          id="overlay-opacity"
          type="range"
          min="0.2"
          max="1"
          step="0.02"
          aria-label="Overlay opacity"
        />
        <span id="overlay-opacity-value" class="value"></span>
      </div>
      <p class="hint hint-small">Lower values show more of the page.</p>

      <label class="label" for="domains">Blocked domains</label>
      <textarea
        id="domains"
        spellcheck="false"
        placeholder="example.com&#10;news.ycombinator.com"
        rows="12"
      ></textarea>

      <div class="actions">
        <button id="save" type="button">Save</button>
        <span id="status" class="status" role="status" aria-live="polite"></span>
      </div>
    </main>

    <script src="domain-utils.js"></script>
    <script src="options.js"></script>
  </body>
</html>
